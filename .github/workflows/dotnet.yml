name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore .\vector-graphic-editor.sln

    - name: Build
      run: dotnet build .\vector-graphic-editor.sln --no-restore

    - name: Test
      run: dotnet test .\vector-graphic-editor.sln --no-build